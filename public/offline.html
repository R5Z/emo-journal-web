<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>오프라인 상태</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f2f2f7;
        color: #111827;
        padding: 24px;
      }

      .card {
        width: min(100%, 420px);
        background: rgba(255, 255, 255, 0.92);
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 22px;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #4b5563;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #000;
          color: #f9fafb;
        }

        .card {
          background: rgba(28, 28, 30, 0.96);
        }

        p {
          color: #d1d5db;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>인터넷 연결이 없어요</h1>
      <p>이미 열어 둔 화면과 로컬에 저장된 기록은 계속 사용할 수 있지만, 새 리소스를 불러오려면 다시 연결이 필요합니다.</p>
    </main>
  </body>
</html>
